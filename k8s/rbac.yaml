apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastapi-sa
  namespace: fastapi-ns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-secret-reader
  namespace: intern-app
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fastapi-sa-binding
  namespace: intern-app
subjects:
  - kind: ServiceAccount
    name: fastapi-sa
    namespace: fastapi-ns
roleRef:
  kind: Role
  name: config-secret-reader
  apiGroup: rbac.authorization.k8s.io
