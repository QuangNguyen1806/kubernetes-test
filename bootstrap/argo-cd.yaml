apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    app.kubernetes.io/name: argo-cd
  annotations:
    # Sync Argo CD itself before apps/infra
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    # Source of truth for Argo CD version: bump targetRevision, git push.
    # Chart versions: https://github.com/argoproj/argo-helm/releases
    # Example: 7.8.2 → Argo CD v2.14.2
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 7.8.2
      helm:
        releaseName: argocd
        valueFiles:
          - $values/bootstrap/argo-cd/values.yaml
    # Git values — any push to values.yaml is picked up automatically
    - repoURL: https://github.com/QuangNguyen1806/kubernetes-test.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - allowEmpty=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - PruneLast=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /status
    # Only ignore install-time admin password; do not blanket-ignore all Secrets
    # (that would block Helm upgrades).
    - kind: Secret
      name: argocd-initial-admin-secret
      jsonPointers:
        - /data
        - /stringData
      jqPathExpressions:
        - .data
        - .stringData
