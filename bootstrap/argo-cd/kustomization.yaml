apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
# Seed only (first install). Keep this pinned to the same Argo CD appVersion
# as the Helm chart in bootstrap/argo-cd.yaml (chart 7.8.2 → app v2.14.2).
# Do NOT use "stable" — it currently tracks v3.x and breaks repo-server on this setup.
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.14.2/manifests/install.yaml

configMapGenerator:
  - name: argocd-cm
    behavior: merge
    literals:
      - timeout.reconciliation=15s

patches:
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: ClusterRoleBinding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: argocd
