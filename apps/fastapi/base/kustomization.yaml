apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fastapi-ns
resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - rbac.yaml
configMapGenerator:
  - name: app-config
    literals:
      - APP_NAME=fastapi
      - REDIS_KEY=items
      - MESSAGE=Goodbye from ConfigMap
secretGenerator:
  - name: app-secret
    literals:
      - API_KEY=sk-super-secret-key
