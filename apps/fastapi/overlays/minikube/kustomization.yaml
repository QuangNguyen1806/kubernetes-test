apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fastapi-ns
resources:
  - ../../../shared/base
  - rbac.yaml
configMapGenerator:
  - name: app-config
    literals:
      - APP_NAME=fastapi
      - REDIS_KEY=items
      - MESSAGE=Goodbye from ConfigMap
secretGenerator:
  - name: app-secret
    literals:
      - API_KEY=sk-super-secret-key
images:
  - name: demo-api
    newName: demo-api
    newTag: latest
patches:
  - path: deployment-patch.yaml
  - path: service-patch.yaml
