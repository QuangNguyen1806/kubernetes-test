apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api2
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/QuangNguyen1806/kubernetes-test.git
    targetRevision: main
    path: apps/api2/overlays/minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: api2-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
