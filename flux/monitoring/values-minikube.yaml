# Shared Helm values for kube-prometheus-stack on Minikube (kept in sync with helmrelease.yaml).
alertmanager:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false
prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      memory: 128Mi
prometheus:
  prometheusSpec:
    retention: 3h
    scrapeInterval: 60s
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        memory: 384Mi
grafana:
  enabled: true
  adminPassword: admin
  image:
    registry: docker.io
    repository: grafana/grafana
    tag: "13.1.0"
  defaultDashboardsEnabled: false
  sidecar:
    dashboards:
      enabled: false
    datasources:
      enabled: false
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090/
          access: proxy
          isDefault: true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 180
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18
