apiVersion: v1
kind: ConfigMap
metadata:
  name: flux-apps-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/managed-by: flux
data:
  flux-apps-overview.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "timeseries",
          "title": "CPU usage by pod (flux apps)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"flux-fastapi-ns|flux-api2-ns|flux-api3-ns\", container!=\"\", container!=\"POD\"}[5m])) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory working set by pod (flux apps)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"flux-fastapi-ns|flux-api2-ns|flux-api3-ns\", container!=\"\", container!=\"POD\"}) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP requests / sec (app metrics)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=~\"flux-fastapi-ns|flux-api2-ns|flux-api3-ns\"}[5m])) by (namespace, handler)",
              "legendFormat": "{{namespace}} {{handler}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP request latency p95 (seconds)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=~\"flux-fastapi-ns|flux-api2-ns|flux-api3-ns\"}[5m])) by (le, namespace))",
              "legendFormat": "{{namespace}} p95",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP 5xx error rate (req/s)",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=~\"flux-fastapi-ns|flux-api2-ns|flux-api3-ns\", status=\"5xx\"}[5m])) by (namespace, handler)",
              "legendFormat": "{{namespace}} {{handler}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "logs",
          "title": "Application logs (Loki)",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{namespace=~\"flux-fastapi-ns|flux-api2-ns|flux-api3-ns\"}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "flux",
        "apps",
        "minikube"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Flux Apps \u2014 CPU, Memory & Logs",
      "uid": "flux-apps-overview",
      "version": 1
    }
