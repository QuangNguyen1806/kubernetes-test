# Loki single-binary — tiny footprint for Minikube log aggregation.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 1h
  timeout: 15m
  releaseName: loki
  targetNamespace: monitoring
  dependsOn:
    - name: kube-prometheus-stack
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: loki
      version: "6.29.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 24h
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 1Gi
      resources:
        requests:
          cpu: 30m
          memory: 96Mi
        limits:
          memory: 256Mi
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    # Off on Minikube — saves an nginx pod; Grafana/Promtail talk to loki:3100.
    gateway:
      enabled: false
    test:
      enabled: false
    lokiCanary:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false
      serviceMonitor:
        enabled: false
