# Phase 1+ (cluster + apps observability): Prometheus + Grafana + Loki datasources,
# Git-provisioned dashboards, ServiceMonitor discovery, delayed Grafana probes.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: enabled
spec:
  interval: 1h
  timeout: 20m
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.16.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    alertmanager:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    nodeExporter:
      enabled: false
    kubeStateMetrics:
      enabled: false
    prometheusOperator:
      tls:
        enabled: false
      admissionWebhooks:
        enabled: false
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
    prometheus:
      prometheusSpec:
        retention: 3h
        scrapeInterval: 30s
        # Discover ServiceMonitors in any namespace (Flux apps).
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        resources:
          requests:
            cpu: 30m
            memory: 128Mi
          limits:
            memory: 256Mi
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-auth
        userKey: admin-user
        passwordKey: admin-password
      image:
        registry: docker.io
        repository: grafana/grafana
        tag: "13.1.0"
      defaultDashboardsEnabled: false
      sidecar:
        dashboards:
          enabled: false
        datasources:
          enabled: false
      # File-provisioned dashboards from ConfigMap flux-apps-dashboard.
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: Flux Apps
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboardsConfigMaps:
        default: flux-apps-dashboard
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              uid: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090/
              access: proxy
              isDefault: true
            - name: Loki
              type: loki
              uid: loki
              # Gateway disabled below to save a pod on ~3Gi Minikube.
              url: http://loki.monitoring.svc:3100
              access: proxy
              isDefault: false
              jsonData:
                httpHeaderName1: X-Scope-OrgID
              secureJsonData:
                httpHeaderValue1: fake
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 30m
          memory: 128Mi
        limits:
          memory: 384Mi
      livenessProbe:
        httpGet:
          path: /api/health
          port: 3000
        initialDelaySeconds: 300
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 12
      readinessProbe:
        httpGet:
          path: /api/health
          port: 3000
        initialDelaySeconds: 120
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 24
