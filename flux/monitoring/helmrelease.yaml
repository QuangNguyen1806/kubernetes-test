# Phase 1 (cluster-level monitoring): Prometheus + Grafana + kube-state-metrics.
#
# Root-cause mitigations for Minikube (~3072MB / Docker Desktop):
# 1) Images are pre-pulled into the Minikube docker daemon (see scripts/preload-monitoring-images.sh)
#    — in-cluster pulls of grafana (~1GB) hang past Helm wait windows.
# 2) No Grafana sidecars / no node-exporter — fewer images + less memory overcommit.
# 3) Grafana probes delayed — Grafana 13.x cold-start migrations exceed default liveness
#    and the kubelet kills the container mid-boot ("failed liveness probe").
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: enabled
spec:
  interval: 1h
  timeout: 20m
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.16.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    alertmanager:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    nodeExporter:
      enabled: false
    # kube-state-metrics disabled: saves ~1 deploy on 3GB Minikube; kubelet/cAdvisor
    # scrapes still provide pod CPU/memory. Re-enable when MINIKUBE_MEMORY>=4096.
    kubeStateMetrics:
      enabled: false
    prometheusOperator:
      # Without this, chart still mounts kube-prometheus-stack-admission which is
      # only created when admission webhooks are enabled → operator stuck ContainerCreating.
      tls:
        enabled: false
      admissionWebhooks:
        enabled: false
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
    prometheus:
      prometheusSpec:
        retention: 3h
        scrapeInterval: 60s
        resources:
          requests:
            cpu: 50m
            memory: 192Mi
          limits:
            memory: 384Mi
    grafana:
      enabled: true
      adminPassword: admin
      # Pin the image that preload-monitoring-images.sh caches into Minikube.
      image:
        registry: docker.io
        repository: grafana/grafana
        tag: "13.1.0"
      defaultDashboardsEnabled: false
      sidecar:
        dashboards:
          enabled: false
        datasources:
          enabled: false
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090/
              access: proxy
              isDefault: true
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      # Grafana 13 cold-start (SQLite migrations) regularly exceeds default probes on Minikube.
      livenessProbe:
        httpGet:
          path: /api/health
          port: 3000
        initialDelaySeconds: 180
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 10
      readinessProbe:
        httpGet:
          path: /api/health
          port: 3000
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 18
