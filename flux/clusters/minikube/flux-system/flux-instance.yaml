apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: enabled
    fluxcd.controlplane.io/reconcileEvery: 1h
    fluxcd.controlplane.io/reconcileTimeout: 5m
spec:
  distribution:
    # Floating minor series — operator auto-upgrades within 2.x
    version: "2.x"
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    size: small
    multitenant: false
    networkPolicy: false
    domain: cluster.local
  sync:
    kind: GitRepository
    url: https://github.com/QuangNguyen1806/kubernetes-test.git
    ref: refs/heads/main
    path: flux/clusters/minikube
    interval: 15s
