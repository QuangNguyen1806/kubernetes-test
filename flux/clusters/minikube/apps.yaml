apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-apps
  namespace: flux-system
spec:
  interval: 15s
  retryInterval: 15s
  timeout: 5m
  prune: true
  wait: true
  # Single entry for all Flux apps — discovered via apps/flux-apps (generated).
  # Add an app: create apps/<name>/overlays/flux + ./scripts/generate-flux-apps.sh
  path: ./apps/flux-apps
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-monitoring
