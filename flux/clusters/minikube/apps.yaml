apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-fastapi
  namespace: flux-system
spec:
  interval: 15s
  retryInterval: 15s
  timeout: 2m
  prune: true
  wait: true
  path: ./apps/fastapi/overlays/flux
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-infrastructure
---
