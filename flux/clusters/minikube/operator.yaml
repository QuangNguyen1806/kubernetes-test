# Self-manage Flux Operator via Git (ResourceSet → OCIRepository + HelmRelease).
# Bootstrap installs the operator once with Helm; this ResourceSet owns upgrades.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: flux-operator
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: enabled
    fluxcd.controlplane.io/reconcileEvery: 1h
    fluxcd.controlplane.io/reconcileTimeout: 5m
spec:
  inputs:
    - version: "0.54.1"
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: flux-operator
        namespace: flux-system
      spec:
        interval: 1h
        url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
        layerSelector:
          mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
          operation: copy
        ref:
          semver: << inputs.version | quote >>
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: flux-operator
        namespace: flux-system
      spec:
        interval: 1h
        releaseName: flux-operator
        chartRef:
          kind: OCIRepository
          name: flux-operator
        install:
          crds: CreateReplace
          remediation:
            retries: 3
        upgrade:
          crds: CreateReplace
          remediation:
            retries: 3
        values:
          installCRDs: true
