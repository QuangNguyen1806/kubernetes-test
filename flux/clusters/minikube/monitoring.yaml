apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-monitoring
  namespace: flux-system
spec:
  interval: 15s
  retryInterval: 15s
  timeout: 10m
  prune: true
  wait: false # HelmReleases (Prometheus/Loki) tracked separately
  path: ./flux/monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-infrastructure
