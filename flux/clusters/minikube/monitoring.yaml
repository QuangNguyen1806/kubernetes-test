apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-monitoring
  namespace: flux-system
spec:
  interval: 15s
  retryInterval: 15s
  # Wait until Prometheus/Grafana/Loki HelmReleases are Ready before flux-apps
  # start — otherwise apps + monitoring fight for ~3Gi Minikube RAM.
  timeout: 25m
  prune: true
  wait: true
  path: ./flux/monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-infrastructure
