apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-monitoring
  namespace: flux-system
spec:
  interval: 15s
  retryInterval: 15s
  timeout: 5m
  prune: true
  wait: false # HelmRelease reconciliation is tracked separately (can take a few minutes)
  path: ./flux/monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-infrastructure
