apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-monitoring
  namespace: flux-system
spec:
  interval: 15s
  retryInterval: 15s
  # Wait until Prometheus + Grafana HelmRelease is Ready before flux-apps
  # start — otherwise apps + monitoring fight for ~3Gi Minikube RAM.
  # Loki/Promtail live in flux-logging (non-blocking).
  timeout: 20m
  prune: true
  wait: true
  path: ./flux/monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-infrastructure
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kube-prometheus-stack
      namespace: flux-system
